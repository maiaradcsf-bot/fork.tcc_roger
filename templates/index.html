<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</head>
<body class="login">

    <img src="{{ url_for('static', filename='imagens/sesi-logo.png') }}" class="sesi-logo" alt="Logo do SESI">

    <h1>Almoxarifado</h1> 


    <div class="login-container">
        <form>
            <div class="mb-3">
                <label for="usuario" class="form-label">Login:</label>
                <input placeholder="Usuario" class="form-control" id="usuario">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha:</label>
                <input placeholder="Senha" type="password" class="form-control " id="password">
            </div>
            
            <button type="button" class="btn btn-primary" onclick="verificar_login()">Entrar</button>
        </form>

    </div>

</body>
</html>
