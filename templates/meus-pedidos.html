<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .table-header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .table-header-wrapper h3 {
            margin: 0;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Almoxarifado</span>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <a href="./dashboard" >Estoque</a>
            <a href="./meus-pedidos" class="active">Meus Pedidos</a>
        </div>

    <div class="col-md-10 p-4">

    <div class="table-header-wrapper">
        <h3>Meus Pedidos</h3>
        <button type="button" class="btn btn-outline-danger" onclick="clearHistory()">Limpar Histórico</button>
    </div>

    <div class="container-box">

            <table class="table table-striped">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nome do Produto</th>
                        <th>Quantidade</th>
                        <th>Email</th>
                        <th>Data da Requisição</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <!-- Os itens requisitados serão inseridos aqui via JS -->
                </tbody>
            </table>

            <div id="empty-message" class="empty-state-message">
                <p class="text-muted">Nenhuma requisição realizada ainda.</p>
            </div>
        </div>

</div>
</div>
</div>
    <script src="{{ url_for('static', filename='meus-pedidos.js') }}"></script>
</body>
</html>
