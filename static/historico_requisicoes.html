<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Requisições</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="controle_estoque.css">
    <script src="controle_estoque.js"></script>
    <style>
        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        
        .controls-left {
            display: flex;
            gap: 10px;
        }
        
        .controls-left a {
            text-decoration: none;
        }
        
        .controls-right {
            display: flex;
            gap: 10px;
        }

        .empty-state-message {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">

        <h2 class="text-center text-white mt-4">Histórico de Requisições</h2>

        <div class="container-box">
            <div class="controls-wrapper">
                <div class="controls-left">
                    <a href="dashboard.html">
                        <button type="button" class="btn btn-outline-info">Voltar</button>
                    </a>
                    <button type="button" class="btn btn-outline-danger" onclick="clearHistory()">Limpar Histórico</button>
                </div>
            </div>

            <table class="table table-striped">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nome do Produto</th>
                        <th>Quantidade</th>
                        <th>Email</th>
                        <th>Data da Requisição</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <!-- Os itens requisitados serão inseridos aqui via JS -->
                </tbody>
            </table>

            <div id="empty-message" class="empty-state-message">
                <p class="text-muted">Nenhuma requisição realizada ainda.</p>
            </div>
        </div>
    </div>

    <script>
        // Carregar histórico de requisições do localStorage
        let requestedItems = [];

        function loadHistory() {
            const savedRequests = localStorage.getItem('requestedItems');
            if (savedRequests) {
                requestedItems = JSON.parse(savedRequests);
            }
            renderHistory();
        }

        function renderHistory() {
            const tbody = document.getElementById('history-body');
            const emptyMessage = document.getElementById('empty-message');
            
            tbody.innerHTML = '';

            if (requestedItems.length === 0) {
                emptyMessage.style.display = 'block';
                return;
            }

            emptyMessage.style.display = 'none';

            requestedItems.forEach(item => {
                const row = `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.name}</td>
                        <td>${item.qty}</td>
                        <td>${item.email}</td>
                        <td>${item.requestDate || 'Data não disponível'}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function clearHistory() {
            if (confirm('Tem certeza que deseja limpar todo o histórico de requisições?')) {
                requestedItems = [];
                localStorage.setItem('requestedItems', JSON.stringify(requestedItems));
                renderHistory();
                Swal.fire('Limpado!', 'O histórico foi removido.', 'success');
            }
        }

        // Carregar ao iniciar
        loadHistory();
    </script>
</body>
</html>
