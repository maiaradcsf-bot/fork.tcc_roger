<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Controle de Estoque</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar Superior -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-warehouse me-2"></i>Almoxarifado
            </a>
            <div class="d-flex">
                <span class="navbar-text text-white me-3">
                    <i class="fas fa-user-circle me-1"></i>Administrador
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="window.location.href='index.html'">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Esquerda -->
            <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse show">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="dashboard.html">
                                <i class="fas fa-boxes me-2"></i>Estoque
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="historico_requisicoes.html">
                                <i class="fas fa-history me-2"></i>Histórico
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Controle de Estoque</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button class="btn btn-sm btn-primary" onclick="window.location.href='S_Estoque.html'">
                            <i class="fas fa-plus me-1"></i>Novo Item
                        </button>
                    </div>
                </div>

                <!-- Tabela de Itens em Estoque -->
                <div class="card mb-4">
                    <div class="card-header bg-dark text-white">
                        <i class="fas fa-list me-2"></i>Itens em Estoque
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Produto</th>
                                        <th>Quantidade</th>
                                        <th>Requisitante</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="inventory-table">
                                    <!-- Itens serão inseridos aqui via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
