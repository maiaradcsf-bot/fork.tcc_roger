<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque</title>
    <link rel="stylesheet" href="estoque.css">
</head>
<body>

    <h1>Controle de Estoque</h1>

<div class="table-container">
        <div class="header-buttons">
            <button class="btn btn-add" onclick="openAddModal()">+ Adicionar Item</button>
            <button class="btn btn-history" onclick="window.location.href='historico_requisicoes.html'">📋 Ver Histórico de Requisições</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome do Produto</th>
                    <th>Quantidade</th>
                    <th>Requisitante</th> <!-- Alterado de Preço para Requisitante -->
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="inventory-body">
                <!-- Os itens serão inseridos aqui via JS -->
            </tbody>
        </table>

        <div class="pagination">
            <button class="btn btn-nav" onclick="changePage(-1)">⬅ Voltar</button>
            <span id="page-indicator" style="margin: 0 10px;">Página 1</span>
            <button class="btn btn-nav" onclick="changePage(1)">Avançar ➡</button>
        </div>
    </div>

    <!-- MODAL DE ADICIONAR/EDITAR -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('itemModal')">&times;</span>
            <h2 id="modalTitle">Novo Item</h2>
            <form id="itemForm" onsubmit="saveItem(event)">
                <input type="hidden" id="itemId"> 
                
                <div class="form-group">
                    <label for="itemName">Produto:</label>
                    <input type="text" id="itemName" required>
                </div>
                <div class="form-group">
                    <label for="itemQty">Quantidade:</label>
                    <input type="number" id="itemQty" required min="0">
                </div>
                <div class="form-group">
                    <label for="itemRequester">Requisitante:</label> <!-- Alterado -->
                    <input type="text" id="itemRequester" required> <!-- Alterado para texto -->
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel" onclick="closeModal('itemModal')">Cancelar</button>
                    <button type="submit" class="btn btn-save">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL DE CONFIRMAÇÃO DE EXCLUSÃO -->
    <div id="deleteModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <span class="close" onclick="closeModal('deleteModal')">&times;</span>
            <h2 style="color: #dc3545;">Confirmar Exclusão</h2>
            <p>Tem certeza que deseja remover este item permanentemente?</p>
            <div class="modal-footer" style="justify-content: center;">
                <button class="btn btn-cancel" onclick="closeModal('deleteModal')">Cancelar</button>
                <button class="btn btn-confirm-delete" onclick="confirmDelete()">Sim, Remover</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONFIRMAÇÃO DE REQUISITAÇÃO -->
    <div id="requestModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <span class="close" onclick="closeModal('requestModal')">&times;</span>
            <h2 style="color: #ffffff;">Confirmar Requisição</h2>
            <p style="color: #ffffff;">Enviar este item para o requisitante?</p>
            <div class="modal-footer" style="justify-content: center;">
                <button class="btn btn-cancel" onclick="closeModal('requestModal')">Cancelar</button>
                <button class="btn btn-request" onclick="confirmRequest()">Sim, Enviar</button>
            </div>
        </div>
    </div>

    <script src="estoque.js"></script>
</body>
</html>
